project:
  name: llm2seq
  task: summarization
  output_dir: runs/phase3_mtp_self_distill_qwen_wikilingua

huggingface:
  enabled: true
  repo_id: BienKieu/llm2seq_qwen3-embedding-0.6B_wikilingua
  repo_type: model
  path_in_repo: checkpoints/phase3_mtp_self_distill_qwen_wikilingua
  phase2_file: encoder-lora_decoder_best.pt
  phase3_file: mtp_best.pt

model:
  encoder_name: Qwen/Qwen3-Embedding-0.6B
  encoder_trainable: false
  use_lora_for_encoder: true
  lora_r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  lora_target_modules:
    [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  encoder_torch_dtype: bfloat16
  d_enc: 1024
  d_dec: 1024

adaptor:
  type: gated_residual
  use_layer_fusion: true
  fusion_type: tokenwise
  fuse_layers: [-1, -4, -8, -12]
  use_salience_gate: true
  use_encstack: true
  encstack_layers: 4
  use_global_memory_tokens: true
  num_global_memory_tokens: 16

small_decoder:
  num_layers: 8
  hidden_size: 1024
  num_heads: 16
  ffn_size: 4096
  dropout: 0.1
  tie_embeddings: true
  max_seq_len: 1024

features:
  use_mtp: true

mtp:
  type: cascaded
  num_heads: 4
  train_only: true
  loss_weight: 0.6
  head_weights: [1.0, 0.8, 0.5, 0.25]
  self_distillation: true
  self_distill_top_k: 2048
  self_distill_temperature: 1.5
  self_distill_loss_weight: 0.2
  self_distill_start_ratio: 0.2
  self_distill_warmup_ratio: 0.3
  self_distill_head_weights: [1.0, 0.8, 0.5, 0.25]

training:
  stage: phase3_mtp_self_distill_qwen_wikilingua

data:
  source_prefix: "Tóm tắt văn bản sau:\n"
  max_source_length: 3072
  max_target_length: 384

generation:
  do_sample: false
  min_new_tokens: 64
  max_new_tokens: 256
  temperature: 0.0
  top_k: 0
  top_p: 1.0
  repetition_penalty: 1.05
  no_repeat_ngram_size: 3
  eval_batch_size: 1
  mtp_fallback_to_autoregressive: false
  mtp_fallback_after_steps: 1
  mtp_fallback_min_emitted_length: 3.8
