project:
  name: llm2seq
  task: translation
  output_dir: runs/llm2seq_mtp_only

model:
  encoder_name: McGill-NLP/LLM2Vec-Meta-Llama-3-8B-Instruct-mntp
  encoder_trainable: false
  use_lora_for_encoder: false
  d_enc: 4096
  d_dec: 768

adaptor:
  type: mlp
  use_layer_fusion: true
  fuse_layers: [-1, -4, -8, -12]
  use_encstack: false
  encstack_layers: 2

small_decoder:
  num_layers: 6
  hidden_size: 768
  num_heads: 12
  ffn_size: 3072
  dropout: 0.1
  tie_embeddings: true
  max_seq_len: 512

features:
  use_mtp: true
  use_distillation: false

mtp:
  type: parallel
  num_heads: 2
  loss_weight: 0.2
  head_weights: [1.0, 0.8]
  use_mtp_at_inference: true
  inference_strategy: confidence_adaptive
  confidence_threshold: 0.9

knowledge_distillation:
  teacher_name: null
  type: topk_kl
  temperature: 2.0
  loss_weight: 0.5
  top_k: 10000
  cache_teacher_logits: true
  detach_teacher: true

training:
  stage: mtp_only
  batch_size: 16
  grad_accum_steps: 8
  learning_rate: 1.0e-4
  decoder_lr: 1.0e-4
  adaptor_lr: 1.0e-4
  encoder_lr: 1.0e-5
  warmup_steps: 500
  max_steps: 30000
  fp16: true
  bf16: false
  gradient_checkpointing: true
  seed: 42
  log_every_steps: 50
  resume_from: runs/llm2seq_baseline/best.pt

data:
  train_file: data/processed/train.jsonl
  eval_file: data/processed/eval.jsonl
  max_source_length: 512
  max_target_length: 256

evaluation:
  metrics: [bleu, rouge, latency, acceptance_rate]
  eval_every_steps: 1000
  save_every_steps: 2000
