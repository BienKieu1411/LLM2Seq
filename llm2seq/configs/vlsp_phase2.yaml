project:
  name: llm2seq
  task: summarization
  output_dir: runs/llm2seq_phase2_lora_encoder_vlsp

huggingface:
  enabled: true
  repo_id: null
  repo_type: model
  path_in_repo: checkpoints/phase2_lora_encoder_vlsp
  push_each_epoch: false
  push_final_best: true
  keep_local_epoch_checkpoints: 1
  fail_on_error: true

model:
  encoder_name: McGill-NLP/LLM2Vec-Sheared-LLaMA-mntp
  encoder_trainable: true
  use_lora_for_encoder: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules:
    [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  encoder_torch_dtype: bfloat16
  d_enc: 2048
  d_dec: 1024

adaptor:
  type: gated_residual
  use_layer_fusion: true
  fusion_type: tokenwise
  fuse_layers: [-1, -4, -8, -12]
  use_salience_gate: true
  use_encstack: true
  encstack_layers: 4
  use_global_memory_tokens: true
  num_global_memory_tokens: 16

small_decoder:
  num_layers: 8
  hidden_size: 1024
  num_heads: 16
  ffn_size: 4096
  dropout: 0.1
  tie_embeddings: true
  max_seq_len: 1024

training:
  stage: phase2_lora_encoder_vlsp
  num_train_epochs: 6
  batch_size: 1
  grad_accum_steps: 16
  decoder_lr: 5.0e-5
  adaptor_lr: 5.0e-5
  encoder_lr: 1.0e-4
  warmup_ratio: 0.05
  min_lr_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  tf32: true
  gradient_checkpointing: true
  seed: 42
  log_every_steps: 2
  skip_optimizer_resume: true
  reset_global_step_on_resume: true
  reset_best_eval_loss_on_resume: true

data:
  train_file: llm2seq/data/processed/vlsp/train.jsonl
  eval_file: llm2seq/data/processed/vlsp/val.jsonl
  test_file: llm2seq/data/processed/vlsp/test.jsonl
  source_prefix: "Tóm tắt các văn bản sau thành một đoạn ngắn gọn:\n"
  max_source_length: 8192
  max_target_length: 768

evaluation:
  metrics: [rouge, latency]
  eval_every_epochs: 1
  save_every_epochs: 1

generation:
  do_sample: false
  min_new_tokens: 32
  max_new_tokens: 768
  temperature: 0.0
  top_k: 0
  top_p: 1.0
  repetition_penalty: 1.15
  no_repeat_ngram_size: 3
  eval_batch_size: 16
